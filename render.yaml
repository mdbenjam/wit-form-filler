services:
  - type: web
    name: wit-form-filler
    runtime: node
    region: oregon
    plan: starter
    rootDir: web
    buildCommand: npx prisma generate --schema=../prisma/schema.prisma && npm run build
    startCommand: npx prisma migrate deploy --schema=../prisma/schema.prisma && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wit-form-filler-db
          property: connectionString
      - key: RENDER_API_KEY
        sync: false
      - key: WORKFLOW_SERVICE_SLUG
        sync: false
      - key: MODAL_ENDPOINT_URL
        sync: false
      - key: TRIGGER_SECRET_KEY
        sync: false

databases:
  - name: wit-form-filler-db
    plan: basic-256mb
    region: oregon
